<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teen's Trouble — เบอร์ 3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <img src="/assets/logoandtheme.jpg" alt="Teen's Trouble" class="login-logo" />
      <p class="login-sub">เลือกห้องเรียนของคุณ</p>
      <div class="classroom-grid" id="classroom-grid"></div>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="hidden">

    <div class="top-bar">
      <img src="/assets/logoandtheme.jpg" alt="Teen's Trouble" class="top-logo" />
      <div class="top-count" id="top-count">0</div>
      <div class="top-class" id="top-class"></div>
    </div>

    <div class="clicker" id="clicker">
      <img id="face" src="/assets/beforeclick.jpg" alt="Teen's Trouble" draggable="false" />
    </div>

  </div>

  <!-- Sidebar tab button (always visible on right edge) -->
  <button id="lb-toggle" class="lb-tab">LEADERBOARD</button>

  <!-- Overlay to close sidebar by tapping outside -->
  <div id="lb-overlay" class="lb-overlay"></div>

  <!-- Leaderboard sidebar -->
  <div id="lb-sidebar" class="lb-sidebar">
    <div class="lb-sidebar-head">
      <span>LEADERBOARD</span>
      <button id="lb-close" class="lb-close-btn">X</button>
    </div>
    <ol id="lb-list"></ol>
  </div>

  <script src="script.js"></script>
</body>
</html>
